<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Tracker Dashboard - June & July 2026 (PostgreSQL)</title>

    <!-- React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>

    <!-- Recharts Dependencies -->
    <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.1.16/dist/Recharts.js"></script>

    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.20.0/babel.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            background: #0F6E56;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 40px;
            border: 1px solid #e0e0e0;
        }

        .form-section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #495057;
            font-size: 14px;
        }

        select, input[type="number"], input[type="date"] {
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            background: white;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #378ADD;
            box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.1);
        }

        .add-button {
            background: #378ADD;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .add-button:hover {
            background: #2c6db8;
        }

        .add-button:active {
            transform: translateY(1px);
        }

        .add-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .charts-section {
            margin-top: 40px;
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 40px;
            border: 1px solid #e0e0e0;
        }

        .chart-container h3 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #378ADD;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px 20px;
            border-radius: 4px;
            margin-top: 15px;
            border: 1px solid #c3e6cb;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 20px;
            border-radius: 4px;
            margin-top: 15px;
            border: 1px solid #f5c6cb;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
            font-size: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }

        .info-text {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            color: #1565c0;
            font-size: 14px;
            border-left: 4px solid #378ADD;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.connected {
            background: #28a745;
        }

        .status-indicator.disconnected {
            background: #dc3545;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Wait for Recharts to load
        if (typeof Recharts === 'undefined') {
            console.error('Recharts not loaded!');
        }

        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts || {};

        // API base URL
        const API_URL = 'http://localhost:3000/api';

        // Complete products list (59 products)
        const PRODUCTS = [
            "PICO", "CHOPPED TOM", "RED ENCH SAUCE", "GREEN ENCH SAUCE", "DARK RED ENCH SAUSE",
            "MILD (PESTO)", "BAJA SAUCE", "TARTER SAUCE", "LETTUCE", "CHEESE (SHREDDED)",
            "RANCHERO SAUCE", "PANCACKE MIX", "RED BEEF TAMALE", "GREEN CK TAMALE", "GREEN CORN TAMALE",
            "RED MENUDO", "WHITE MENUDO", "COCIDO", "ALBONDIGAS", "CARNE ASADA",
            "POLO ASADA", "PLAIN BEEF", "PLAIN CHICKEN", "GROUND BEEF", "CARNITAS",
            "BEANS", "RICE", "BEEF TACOS", "CK TACOS", "BEEF FLAUTAS",
            "CK FLAUTAS", "BEEF SUPER TACO", "CK SUPER TACO", "MACHACA BEEF", "MACHACA CK",
            "CHILLI RELLENOS", "FISH", "CEVICHE", "COOCKED SHRIMP", "OCTOPUS",
            "RED SALSA", "GREEN SALSA", "CHUNKY SALSA", "GUAC SALSA", "ORANGE SALSA",
            "BROWN SALSA", "GUACAMOLE", "GRAVY MIX", "RANCH", "PITAS",
            "ROLLED TACOS", "BEEF MINI CHIMI", "CK MINI CHIMI", "BEEF MINI TACO", "CK MINI TACO",
            "BEEF MINI FLAUTAS", "CK MINI FLAUTAS", "AL PASTOR", "BIRRIA"
        ];

        const BUCKET_SIZES = ["Small", "Medium", "Large"];

        // Calculate monthly aggregations from database entries
        function calculateMonthlyData(entries, bucketSize) {
            const monthlyData = {};

            // Initialize all products with zero values
            PRODUCTS.forEach(product => {
                monthlyData[product] = {
                    name: product,
                    "Jun 2026": 0,
                    "Jul 2026": 0
                };
            });

            // Aggregate data from entries
            entries.forEach(entry => {
                if (entry.bucket_size === bucketSize) {
                    const entryDate = new Date(entry.entry_date);
                    const month = entryDate.getMonth() + 1; // 1-based month
                    const monthKey = month === 6 ? "Jun 2026" : "Jul 2026";

                    if (monthlyData[entry.product]) {
                        monthlyData[entry.product][monthKey] += parseFloat(entry.quantity);
                    }
                }
            });

            return Object.values(monthlyData);
        }

        function FoodTrackerApp() {
            const [entries, setEntries] = useState([]);
            const [selectedDate, setSelectedDate] = useState("2026-06-19");
            const [selectedProduct, setSelectedProduct] = useState(PRODUCTS[0]);
            const [selectedSize, setSelectedSize] = useState(BUCKET_SIZES[0]);
            const [quantity, setQuantity] = useState(0);
            const [showSuccess, setShowSuccess] = useState(false);
            const [showError, setShowError] = useState(false);
            const [errorMessage, setErrorMessage] = useState("");
            const [loading, setLoading] = useState(true);
            const [isConnected, setIsConnected] = useState(false);

            // Fetch all entries on component mount
            useEffect(() => {
                fetchEntries();
            }, []);

            const fetchEntries = async () => {
                try {
                    const response = await fetch(`${API_URL}/entries/range?startDate=2026-06-19&endDate=2026-07-31`);
                    if (!response.ok) throw new Error('Failed to fetch entries');
                    const data = await response.json();
                    setEntries(data);
                    setIsConnected(true);
                    setLoading(false);
                } catch (error) {
                    console.error('Error fetching entries:', error);
                    setErrorMessage('Unable to connect to database. Please check if the server is running.');
                    setShowError(true);
                    setIsConnected(false);
                    setLoading(false);
                }
            };

            const handleAddEntry = async () => {
                if (!selectedDate || !selectedProduct || !selectedSize || quantity === "" || parseFloat(quantity) <= 0) {
                    setErrorMessage("Please fill in all fields with a valid quantity");
                    setShowError(true);
                    setTimeout(() => setShowError(false), 3000);
                    return;
                }

                try {
                    const response = await fetch(`${API_URL}/entries`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            entry_date: selectedDate,
                            product: selectedProduct,
                            bucket_size: selectedSize,
                            quantity: parseFloat(quantity)
                        })
                    });

                    if (!response.ok) throw new Error('Failed to add entry');

                    // Refresh entries
                    await fetchEntries();

                    setQuantity(0);
                    setShowSuccess(true);
                    setTimeout(() => setShowSuccess(false), 2000);
                } catch (error) {
                    console.error('Error adding entry:', error);
                    setErrorMessage('Failed to add entry. Please try again.');
                    setShowError(true);
                    setTimeout(() => setShowError(false), 3000);
                }
            };

            if (loading) {
                return (
                    <div className="container">
                        <div className="loading">Loading data from database...</div>
                    </div>
                );
            }

            const smallData = calculateMonthlyData(entries, "Small");
            const mediumData = calculateMonthlyData(entries, "Medium");
            const largeData = calculateMonthlyData(entries, "Large");

            return (
                <div className="container">
                    <h1>
                        Food Tracker Interactive Dashboard
                        <span className="badge">PostgreSQL</span>
                    </h1>
                    <p className="subtitle">
                        <span className={`status-indicator ${isConnected ? 'connected' : 'disconnected'}`}></span>
                        Track daily food product quantities - June 19 to July 31, 2026
                        {isConnected ? ' (Database Connected)' : ' (Database Disconnected)'}
                    </p>

                    <div className="form-section">
                        <h2>Add Entry</h2>
                        <div className="info-text">
                            Enter your daily food quantities below. Data is saved to PostgreSQL database and charts update in real-time.
                        </div>

                        <div className="form-grid">
                            <div className="form-group">
                                <label htmlFor="date">Date</label>
                                <input
                                    type="date"
                                    id="date"
                                    value={selectedDate}
                                    onChange={(e) => setSelectedDate(e.target.value)}
                                    min="2026-06-19"
                                    max="2026-07-31"
                                />
                            </div>

                            <div className="form-group">
                                <label htmlFor="product">Product</label>
                                <select
                                    id="product"
                                    value={selectedProduct}
                                    onChange={(e) => setSelectedProduct(e.target.value)}
                                >
                                    {PRODUCTS.map(product => (
                                        <option key={product} value={product}>{product}</option>
                                    ))}
                                </select>
                            </div>

                            <div className="form-group">
                                <label htmlFor="size">Bucket Size</label>
                                <select
                                    id="size"
                                    value={selectedSize}
                                    onChange={(e) => setSelectedSize(e.target.value)}
                                >
                                    {BUCKET_SIZES.map(size => (
                                        <option key={size} value={size}>{size}</option>
                                    ))}
                                </select>
                            </div>

                            <div className="form-group">
                                <label htmlFor="quantity">Quantity</label>
                                <input
                                    type="number"
                                    id="quantity"
                                    value={quantity}
                                    onChange={(e) => setQuantity(e.target.value)}
                                    min="0"
                                    step="0.1"
                                />
                            </div>
                        </div>

                        <button
                            className="add-button"
                            onClick={handleAddEntry}
                            disabled={!isConnected}
                        >
                            {isConnected ? 'Add Entry' : 'Database Disconnected'}
                        </button>

                        <div className={`success-message ${showSuccess ? 'show' : ''}`}>
                            ✓ Entry saved to database successfully!
                        </div>

                        <div className={`error-message ${showError ? 'show' : ''}`}>
                            ✗ {errorMessage}
                        </div>
                    </div>

                    <div className="charts-section">
                        <h2 style={{marginBottom: '30px', color: '#2c3e50', fontSize: '24px'}}>
                            Monthly Comparison Charts
                        </h2>

                        {/* Small Bucket Chart */}
                        <div className="chart-container">
                            <h3>Small Bucket - All Products (June vs July 2026)</h3>
                            <div className="legend">
                                <div className="legend-item">
                                    <div className="legend-color" style={{background: '#378ADD'}}></div>
                                    <span>June 2026</span>
                                </div>
                                <div className="legend-item">
                                    <div className="legend-color" style={{background: '#0F6E56'}}></div>
                                    <span>July 2026</span>
                                </div>
                            </div>
                            <ResponsiveContainer width="100%" height={1600}>
                                <BarChart
                                    data={smallData}
                                    layout="vertical"
                                    margin={{ top: 5, right: 30, left: 150, bottom: 5 }}
                                >
                                    <CartesianGrid strokeDasharray="3 3" />
                                    <XAxis type="number" />
                                    <YAxis dataKey="name" type="category" width={140} />
                                    <Tooltip />
                                    <Bar dataKey="Jun 2026" fill="#378ADD" />
                                    <Bar dataKey="Jul 2026" fill="#0F6E56" />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>

                        {/* Medium Bucket Chart */}
                        <div className="chart-container">
                            <h3>Medium Bucket - All Products (June vs July 2026)</h3>
                            <div className="legend">
                                <div className="legend-item">
                                    <div className="legend-color" style={{background: '#378ADD'}}></div>
                                    <span>June 2026</span>
                                </div>
                                <div className="legend-item">
                                    <div className="legend-color" style={{background: '#0F6E56'}}></div>
                                    <span>July 2026</span>
                                </div>
                            </div>
                            <ResponsiveContainer width="100%" height={1600}>
                                <BarChart
                                    data={mediumData}
                                    layout="vertical"
                                    margin={{ top: 5, right: 30, left: 150, bottom: 5 }}
                                >
                                    <CartesianGrid strokeDasharray="3 3" />
                                    <XAxis type="number" />
                                    <YAxis dataKey="name" type="category" width={140} />
                                    <Tooltip />
                                    <Bar dataKey="Jun 2026" fill="#378ADD" />
                                    <Bar dataKey="Jul 2026" fill="#0F6E56" />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>

                        {/* Large Bucket Chart */}
                        <div className="chart-container">
                            <h3>Large Bucket - All Products (June vs July 2026)</h3>
                            <div className="legend">
                                <div className="legend-item">
                                    <div className="legend-color" style={{background: '#378ADD'}}></div>
                                    <span>June 2026</span>
                                </div>
                                <div className="legend-item">
                                    <div className="legend-color" style={{background: '#0F6E56'}}></div>
                                    <span>July 2026</span>
                                </div>
                            </div>
                            <ResponsiveContainer width="100%" height={1600}>
                                <BarChart
                                    data={largeData}
                                    layout="vertical"
                                    margin={{ top: 5, right: 30, left: 150, bottom: 5 }}
                                >
                                    <CartesianGrid strokeDasharray="3 3" />
                                    <XAxis type="number" />
                                    <YAxis dataKey="name" type="category" width={140} />
                                    <Tooltip />
                                    <Bar dataKey="Jun 2026" fill="#378ADD" />
                                    <Bar dataKey="Jul 2026" fill="#0F6E56" />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<FoodTrackerApp />, document.getElementById('root'));
    </script>
</body>
</html>
